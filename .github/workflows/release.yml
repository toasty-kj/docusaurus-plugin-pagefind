name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm build

      - name: Run tests
        run: pnpm test

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Must be a single command that runs through a shell: changesets/action
          # splits this string on whitespace and runs it WITHOUT a shell, so `&&`
          # chaining only works when delegated to a package.json script. The
          # script publishes to npm (OIDC) then runs `changeset tag`, whose
          # "New tag:" stdout is how the action detects a publish happened
          # (drives the `published` output, git tags, and GitHub Releases).
          publish: pnpm run ci:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Ship the demo/docs site as part of every release that actually published.
  deploy-wiki:
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm build

      - name: Build wiki demo
        run: pnpm build:wiki

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/wiki/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
