name: Sync main into develop

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: develop
          fetch-depth: 0

      - name: Merge main into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge origin/main --no-ff -m "chore: sync main into develop"

      - name: Open PR if there are changes
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/sync-main-into-develop
          base: develop
          delete-branch: true
          title: "chore: sync main into develop"
          commit-message: "chore: sync main into develop"
          body: |
            Automated back-merge of `main` into `develop` after a release.

            Keeps the next release cycle starting from a consistent baseline —
            without this, already-consumed changesets and version bumps from
            the release can resurface or conflict on the next develop→main PR.
