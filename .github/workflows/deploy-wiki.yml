name: Deploy wiki

# Wiki/docs deployment is decoupled from npm releases. The github-pages
# environment only permits deployments from `develop`, so this runs there
# on any change that affects the demo site (or the plugin it showcases),
# independent of version bumps.
on:
  push:
    branches: [develop]
    paths:
      - 'apps/wiki/**'
      - 'packages/docusaurus-plugin-pagefind/**'
      - '.github/workflows/deploy-wiki.yml'

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build wiki demo
        run: pnpm build:wiki

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/wiki/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
